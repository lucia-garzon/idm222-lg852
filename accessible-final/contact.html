    <!-- FIX HTML FOR ABOUT SECTION! ADD ARIA! -->

    <main id="main" class="contact-wrapper">

        <section aria-label="Contact Form" class="contact">
            <h3 class="contact-title">Drop a message, don't be shy!</h3>
        
                <form action="" method="post" novalidate>
                    <fieldset>
                        <legend>Contact information</legend>
                        <label for="firstname">
                            First name
                            <span class="required-indicator" aria-hidden="true" >*</span>
                            <span class="sr-only">required</span>
                        </label>
                        <input 
                            type="text"
                            id="firstname"
                            name="firstname"
                            autocomplete="given-name"
                            required
                            aria-required="true"
                            aria-describedby="firstname-error">
                        <span 
                            id="firstname-error"
                            class="error-message"
                            role="alert"
                            aria-live="polite"></span>
        
                        <label for="lastname">
                            Last name
                            <span class="required-indicator" aria-hidden="true">*</span>
                            <span class="sr-only">required</span>
                        </label>
                        <input 
                            type="text"
                            id="lastname"
                            name="lastname"
                            autocomplete="family-name"
                            required
                            aria-required="true"
                            aria-describedby="lastname-error">
                        <span 
                            id="lastname-error"
                            class="error-message"
                            role="alert"
                            aria-live="polite"></span>

                            <label for="email">
                                Email address
                                <span class="required-indicator" aria-hidden="true">*</span>
                                <span class="sr-only">required</span>
                            </label>
                            <input 
                                type="email"
                                id="email"
                                name="email"
                                autocomplete="email"
                                required
                                aria-required="true"
                                aria-describedby="email-error">
                            <span 
                                id="email-error"
                                class="error-message"
                                role="alert"
                                aria-live="polite"></span>
                
                            <label for="message">
                                What's your reason for reaching out?
                                <span class="required-indicator" aria-hidden="true">*</span>
                                <span class="sr-only">required</span>
                            </label>
                            <textarea
                                id="message"
                                name="message"
                                required
                                aria-required="true"
                                aria-describedby="message-error"></textarea>
                            <span 
                                id="message-error"
                                class="error-message"
                                role="alert"
                                aria-live="polite"></span>
                
                            
                
                            <section class="button-group">
                                <button type="submit" class="submit-button" id="submit-btn">
                                    Submit Form
                                </button>
                                <button type="reset" class="reset-button" id="discard-btn">
                                    Discard
                                </button>
                            </section>
                            <span id="form-feedback" aria-live="polite"></span>
                    </fieldset>
        
                
        
                </form>
            </section>
            <figure class="" aria-label="Frog on lilyad looking excited">
                <img 
                    class="frog"
                    src="graphics/frog-excited.png"
                    alt="Drawing of excited frog on lilypad">
            </figure>
    </main>
